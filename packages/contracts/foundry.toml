[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
]

[profile.default.fuzz]
runs = 256

[profile.ci]
fuzz = { runs = 1000 }

[rpc_endpoints]
arcTestnet = "${ARC_TESTNET_RPC_URL}"
arcMainnet = "${ARC_MAINNET_RPC_URL}"

[etherscan]
arcTestnet = { key = "${ETHERSCAN_API_KEY}", url = "${ARC_TESTNET_EXPLORER_URL}" }
arcMainnet = { key = "${ETHERSCAN_API_KEY}", url = "${ARC_MAINNET_EXPLORER_URL}" }
